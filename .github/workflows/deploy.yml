name: Build and Deploy Voting App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push vote
        uses: docker/build-push-action@v5
        with:
          context: ./vote
          push: true
          tags: tannaz87/vote:latest

      - name: Build and push result
        uses: docker/build-push-action@v5
        with:
          context: ./result
          push: true
          tags: tannaz87/result:latest

      - name: Build and push worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: tannaz87/worker:latest
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH and redeploy containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FRONTEND_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull tannaz87/vote:latest
            sudo docker pull tannaz87/result:latest
            sudo docker rm -f vote result
            sudo docker run -d --name vote -p 8080:80 \
              -e REDIS_HOST=10.0.2.216 tannaz87/vote:latest
            sudo docker run -d --name result -p 8081:4000 \
              -e PG_HOST=10.0.3.161 -e PORT=4000 tannaz87/result:latest

  deploy-k8s:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Kubernetes manifests
        run: |
          # Validate YAML syntax for all manifests
          # In production with EKS, replace with:
          # aws eks update-kubeconfig --name voting-app-cluster --region eu-central-1
          # kubectl apply -f k8s/
          python3 -c "
          import yaml, sys, glob
          files = glob.glob('k8s/*.yaml')
          for f in files:
              with open(f) as fh:
                  list(yaml.safe_load_all(fh))
              print(f'✓ {f} is valid YAML')
          print('All manifests validated successfully')
          "
