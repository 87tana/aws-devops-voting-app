services:
  vote:
    build: ./vote
    ports:
      - "8080:80"
    environment:
      REDIS_HOST: redis
    depends_on:
      - redis
    networks:
      - back-tier

  result:
    build: ./result
    ports:
      - "8081:4000"
    environment:
      POSTGRES_HOST: db
    depends_on:
      - db
    networks:
      - back-tier

  worker:
    build: ./worker
    environment:
      REDIS_HOST: redis
      POSTGRES_HOST: db
    depends_on:
      - redis
      - db
    networks:
      - back-tier

  redis:
    image: redis:alpine
    networks:
      - back-tier

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - back-tier

networks:
  back-tier:

volumes:
  db-data:
