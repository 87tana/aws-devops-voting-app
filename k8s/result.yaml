apiVersion: apps/v1
kind: Deployment
metadata:
  name: result
spec:
  replicas: 1
  selector:
    matchLabels:
      app: result
  template:
    metadata:
      labels:
        app: result
    spec:
      containers:
      - name: result
        image: tannaz87/result:latest
        ports:
        - containerPort: 4000
        env:
        - name: PG_HOST
          value: "db"
        - name: PG_PORT
          value: "5432"
        - name: PORT
          value: "4000"
---
apiVersion: v1
kind: Service
metadata:
  name: result
spec:
  type: NodePort
  selector:
    app: result
  ports:
  - port: 4000
    targetPort: 4000
